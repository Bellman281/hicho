<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
    <style>
      .t{fill:#0f172a;} .sub{fill:#475569;font-size:11px;} .lbl{fill:#64748b;font-size:10.5px;} .h{font-weight:700;}
      .layer{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5;}
      .dom{fill:#eef2ff;stroke:#6366f1;stroke-width:1.5;}
      .lock{fill:#fff7ed;stroke:#f59e0b;stroke-width:1.5;}
      .chan{fill:#eff6ff;stroke:#3b82f6;stroke-width:1.5;}
      .actor{fill:#f5f3ff;stroke:#7c3aed;stroke-width:1.5;}
      .atom{fill:#ecfdf5;stroke:#10b981;stroke-width:1.5;}
      .flow{stroke:#475569;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <rect x="1" y="1" width="938" height="558" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="26" y="34" class="t h" font-size="17">url-shortener — architecture</text>
  <text x="26" y="52" class="sub">Hexagonal (ports &amp; adapters): dependencies point inward · concurrency matched to each access pattern</text>

  <!-- layer row -->
  <rect class="layer" x="24"  y="90" width="150" height="92" rx="10"/>
  <text x="99" y="120" class="t h" font-size="13" text-anchor="middle">client</text>
  <text x="99" y="140" class="lbl" text-anchor="middle">HTTP request</text>
  <text x="99" y="156" class="lbl" text-anchor="middle">GET /:code → 302</text>

  <rect class="layer" x="230" y="90" width="150" height="92" rx="10"/>
  <text x="305" y="120" class="t h" font-size="13" text-anchor="middle">api</text>
  <text x="305" y="140" class="sub" text-anchor="middle">Axum router</text>
  <text x="305" y="156" class="lbl" text-anchor="middle">handlers, DTOs</text>

  <rect class="layer" x="436" y="90" width="160" height="92" rx="10"/>
  <text x="516" y="120" class="t h" font-size="13" text-anchor="middle">application</text>
  <text x="516" y="140" class="sub" text-anchor="middle">LinkService</text>
  <text x="516" y="156" class="lbl" text-anchor="middle">use cases</text>

  <rect class="dom" x="652" y="90" width="150" height="92" rx="10"/>
  <text x="727" y="118" class="t h" font-size="13" text-anchor="middle">domain</text>
  <text x="727" y="138" class="sub" text-anchor="middle">Repository trait</text>
  <text x="727" y="154" class="lbl" text-anchor="middle">newtypes, rules</text>

  <rect class="layer" x="652" y="206" width="264" height="66" rx="10"/>
  <text x="784" y="232" class="t h" font-size="13" text-anchor="middle">infrastructure (adapters)</text>
  <text x="784" y="252" class="lbl" text-anchor="middle">SqliteLinkRepository · in-memory actor (tests)</text>

  <!-- inward arrows -->
  <path class="flow" d="M174 136 H228" marker-end="url(#a)"/>
  <path class="flow" d="M380 136 H434" marker-end="url(#a)"/>
  <path class="flow" d="M596 136 H650" marker-end="url(#a)"/>
  <text x="623" y="128" class="lbl" text-anchor="middle">depends on</text>
  <path class="flow" d="M784 206 V184" marker-end="url(#a)"/>
  <text x="820" y="198" class="lbl">implements</text>
  <text x="470" y="80" class="lbl">← the dependency rule: arrows point inward, business logic depends on nothing outward →</text>

  <!-- concurrency band -->
  <text x="26" y="316" class="t h" font-size="13">Concurrency — the tool matched to each access pattern (see docs/CONCURRENCY.md)</text>

  <rect class="lock" x="24" y="332" width="212" height="92" rx="10"/>
  <text x="130" y="358" class="t h" font-size="12.5" text-anchor="middle">rate limiter — Mutex</text>
  <text x="130" y="378" class="sub" text-anchor="middle">per-IP token bucket</text>
  <text x="130" y="394" class="lbl" text-anchor="middle">short critical section;</text>
  <text x="130" y="408" class="lbl" text-anchor="middle">idle-bucket sweeper</text>

  <rect class="actor" x="252" y="332" width="212" height="92" rx="10"/>
  <text x="358" y="358" class="t h" font-size="12.5" text-anchor="middle">cache — actor / Redis</text>
  <text x="358" y="378" class="sub" text-anchor="middle">cache-aside (hot reads)</text>
  <text x="358" y="394" class="lbl" text-anchor="middle">in-memory = owning task;</text>
  <text x="358" y="408" class="lbl" text-anchor="middle">prod = Redis (shared)</text>

  <rect class="chan" x="480" y="332" width="248" height="92" rx="10"/>
  <text x="604" y="358" class="t h" font-size="12.5" text-anchor="middle">hit counter — channel batcher</text>
  <text x="604" y="378" class="sub" text-anchor="middle">redirect → mpsc (non-blocking)</text>
  <text x="604" y="394" class="lbl" text-anchor="middle">background task coalesces →</text>
  <text x="604" y="408" class="lbl" text-anchor="middle">hits = hits + n (batched)</text>

  <rect class="atom" x="744" y="332" width="172" height="92" rx="10"/>
  <text x="830" y="358" class="t h" font-size="12.5" text-anchor="middle">metrics — atomic</text>
  <text x="830" y="378" class="sub" text-anchor="middle">AtomicU64 (lock-free)</text>
  <text x="830" y="394" class="lbl" text-anchor="middle">redirects served →</text>
  <text x="830" y="408" class="lbl" text-anchor="middle">GET /metrics</text>

  <!-- links from layers to concurrency pieces -->
  <path class="flow" d="M280 182 C250 250, 150 270, 130 330" marker-end="url(#a)"/>
  <path class="flow" d="M500 182 C440 250, 380 270, 360 330" marker-end="url(#a)"/>
  <path class="flow" d="M540 182 C580 250, 600 270, 604 330" marker-end="url(#a)"/>
  <path class="flow" d="M330 182 C520 260, 800 270, 830 330" marker-end="url(#a)"/>

  <!-- AppState note -->
  <rect class="layer" x="24" y="446" width="892" height="34" rx="8" fill="#f1f5f9"/>
  <text x="470" y="468" class="sub h" text-anchor="middle">all wired into one Arc&lt;AppState&gt; — read-only shared state (no lock; Arc + Deref are not a mutex)</text>

  <!-- legend -->
  <rect class="lock" x="24" y="500" width="15" height="12" rx="3"/><text x="46" y="510" class="lbl">Mutex (short critical section)</text>
  <rect class="actor" x="250" y="500" width="15" height="12" rx="3"/><text x="272" y="510" class="lbl">actor (owning task, no lock)</text>
  <rect class="chan" x="470" y="500" width="15" height="12" rx="3"/><text x="492" y="510" class="lbl">channel (fire-and-forget, batched)</text>
  <rect class="atom" x="730" y="500" width="15" height="12" rx="3"/><text x="752" y="510" class="lbl">atomic (lock-free)</text>
</svg>
